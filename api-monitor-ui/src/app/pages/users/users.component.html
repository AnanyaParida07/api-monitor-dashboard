<div class="page-header">
  <div>
    <h1>User Management</h1>

    <p>Manage application users and assign roles.</p>
  </div>

  <button mat-raised-button color="primary" routerLink="/users/new">
    + Add User
  </button>
</div>

<div class="search-box">
  <input
    type="text"
    placeholder="🔍 Search users..."
    [(ngModel)]="searchText"
    (input)="searchUsers()"
  />
</div>

<div class="users-grid">
  @for (user of filteredUsers; track user.id) {
    <mat-card class="user-card">
      <div class="avatar">
        {{ user.username.charAt(0).toUpperCase() }}
      </div>

      <h2>
        {{ user.username }}
      </h2>

      <span
        class="role"
        [class.admin]="user.role === 'ADMIN'"
        [class.user]="user.role === 'USER'"
      >
        {{ user.role }}
      </span>

      <div class="buttons">
        <button
          mat-stroked-button
          color="primary"
          [routerLink]="['/users/edit', user.id]"
        >
          Edit
        </button>

        <button
          mat-raised-button
          color="warn"
          [disabled]="user.username === authService.getUsername()"
          (click)="deleteUser(user.id)"
        >
          Delete
        </button>
      </div>
    </mat-card>
  }
</div>
