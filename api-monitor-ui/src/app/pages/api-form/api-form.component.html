<h2>Create API</h2>
<mat-card>

  <mat-card-header>

    <mat-card-title>

      @if(isEditMode) {

        Edit API

      } @else {

        Create API

      }

    </mat-card-title>

  </mat-card-header>

  <mat-card-content>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()">

      <mat-form-field appearance="outline">

        <mat-label>
          API Name
        </mat-label>

        <input
          matInput
          formControlName="name">

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>
          URL
        </mat-label>

        <input
          matInput
          formControlName="url">

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>
          Method
        </mat-label>

        <mat-select
          formControlName="method">

          <mat-option value="GET">
            GET
          </mat-option>

          <mat-option value="POST">
            POST
          </mat-option>

          <mat-option value="PUT">
            PUT
          </mat-option>

          <mat-option value="DELETE">
            DELETE
          </mat-option>

        </mat-select>

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>
          Expected Status
        </mat-label>

        <input
          matInput
          type="number"
          formControlName="expectedStatus">

      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="submit">

        @if(isEditMode) {

          Update API

        } @else {

          Create API

        }

      </button>

    </form>

  </mat-card-content>

</mat-card>
